<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto-Researcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #08080d;
      --s0:      #0c0c14;
      --s1:      #111120;
      --s2:      #16162a;
      --border:  #1c1c30;
      --border2: #252540;
      --text:    #ddddf0;
      --text2:   #8888aa;
      --text3:   #44445a;
      --green:  #3dd68c;  --green-a:  rgba(61,214,140,0.1);
      --red:    #f25f5c;  --red-a:    rgba(242,95,92,0.1);
      --yellow: #f0b429;  --yellow-a: rgba(240,180,41,0.1);
      --blue:   #5b7cf6;  --blue-a:   rgba(91,124,246,0.1);
      --purple: #a78bfa;  --purple-a: rgba(167,139,250,0.1);
      --teal:   #22d3ee;
      --page-width: 860px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,8,13,0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      height: 54px;
      display: flex; align-items: center;
      padding: 0 24px; gap: 14px;
    }
    .logo { display: flex; align-items: center; gap: 10px; flex: 1; }
    .logo-mark {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #fff;
      box-shadow: 0 0 16px rgba(91,124,246,0.3);
    }
    .logo-name { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 500; border: 1px solid transparent;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status-pill.running  { background: var(--green-a);  color: var(--green);  border-color: rgba(61,214,140,0.25); }
    .status-pill.stopped  { background: var(--red-a);    color: var(--red);    border-color: rgba(242,95,92,0.25); }
    .status-pill.paused   { background: var(--yellow-a); color: var(--yellow); border-color: rgba(240,180,41,0.25); }
    .status-pill.running .status-dot  { background: var(--green); animation: blink 1.6s ease-in-out infinite; }
    .status-pill.stopped .status-dot  { background: var(--red); }
    .status-pill.paused .status-dot   { background: var(--yellow); }
    @keyframes blink {
      0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(61,214,140,0.5); }
      50%      { opacity: 0.7; box-shadow: 0 0 0 5px rgba(61,214,140,0); }
    }

    #connection-status {
      font-size: 11px; font-weight: 500; color: var(--text3);
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    #connection-status::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    #connection-status.connected    { color: var(--green); }
    #connection-status.disconnected { color: var(--red); }

    .controls { display: flex; gap: 6px; }
    button {
      display: inline-flex; align-items: center; gap: 5px;
      border: 1px solid transparent; border-radius: 7px;
      padding: 6px 13px; font-size: 12px; font-family: inherit;
      font-weight: 500; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-start  { background: var(--green-a);  color: var(--green);  border-color: rgba(61,214,140,0.2); }
    .btn-stop   { background: var(--red-a);    color: var(--red);    border-color: rgba(242,95,92,0.2); }
    .btn-pause  { background: var(--yellow-a); color: var(--yellow); border-color: rgba(240,180,41,0.2); }
    .btn-resume { background: var(--blue-a);   color: var(--blue);   border-color: rgba(91,124,246,0.2); }
    .btn-start:hover:not(:disabled)  { background: rgba(61,214,140,0.18); border-color: rgba(61,214,140,0.45); }
    .btn-stop:hover:not(:disabled)   { background: rgba(242,95,92,0.18);  border-color: rgba(242,95,92,0.45); }
    .btn-pause:hover:not(:disabled)  { background: rgba(240,180,41,0.18); border-color: rgba(240,180,41,0.45); }
    .btn-resume:hover:not(:disabled) { background: rgba(91,124,246,0.18); border-color: rgba(91,124,246,0.45); }

    /* ── Page ── */
    .page {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 24px 24px 0;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── Stats ── */
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
    .stat-box {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      transition: border-color 0.2s;
    }
    .stat-box:hover { border-color: var(--border2); }
    .stat-label {
      font-size: 10px; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
    }
    .stat-value { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
    .stat-mono  { font-family: 'JetBrains Mono','Fira Code','SF Mono',monospace; font-size: 15px; }
    .outcome-win     { color: var(--green) !important; }
    .outcome-mistake { color: var(--red)   !important; }

    /* ── Card ── */
    .card {
      background: var(--s1); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden;
    }
    .card-head {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title {
      font-size: 11px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .card-meta { font-size: 11px; color: var(--text3); }
    .card-body { padding: 16px; }

    /* ── Hypothesis ── */
    #hypothesis-text { font-size: 14px; line-height: 1.65; }
    #hypothesis-rationale {
      font-size: 12px; color: var(--text3); margin-top: 10px;
      padding-top: 10px; border-top: 1px solid var(--border);
      font-style: italic; display: none;
    }
    #hypothesis-rationale.visible { display: block; }

    /* ── Chart ── */
    #score-chart { width: 100%; height: 120px; display: block; }

    /* ── Subagents ── */
    .subagent-grid { display: flex; flex-direction: column; gap: 10px; }

    .subagent-panel {
      background: var(--s0); border: 1px solid var(--border);
      border-left: 3px solid var(--border2); border-radius: 8px; padding: 14px 16px;
      transition: border-left-color 0.3s;
    }
    .subagent-panel.spawned  { border-left-color: var(--blue); }
    .subagent-panel.progress { border-left-color: var(--yellow); }
    .subagent-panel.success  { border-left-color: var(--green); }
    .subagent-panel.failed   { border-left-color: var(--red); }
    .subagent-panel.partial  { border-left-color: var(--purple); }

    .subagent-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .subagent-id {
      font-size: 10px; font-family: monospace; color: var(--text3);
      background: var(--s2); padding: 2px 6px; border-radius: 4px;
    }
    .tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 5px; }
    .model-tag    { background: rgba(91,124,246,0.12);  color: var(--blue); }
    .fallback-tag { background: rgba(167,139,250,0.12); color: var(--purple); }
    .skill-tag    { background: rgba(61,214,140,0.1);   color: var(--green); }

    .subagent-goal { font-size: 13px; line-height: 1.45; margin-bottom: 8px; }

    .subagent-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .subagent-status {
      font-size: 11px; font-weight: 500;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .subagent-status::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    }
    .subagent-status.spawned::before  { background: var(--blue); }
    .subagent-status.spawned          { color: var(--blue); }
    .subagent-status.progress::before { background: var(--yellow); animation: blink 1.2s ease-in-out infinite; }
    .subagent-status.progress         { color: var(--yellow); }
    .subagent-status.success::before  { background: var(--green); }
    .subagent-status.success          { color: var(--green); }
    .subagent-status.failed::before   { background: var(--red); }
    .subagent-status.failed           { color: var(--red); }
    .subagent-status.partial::before  { background: var(--purple); }
    .subagent-status.partial          { color: var(--purple); }

    .subagent-files { font-size: 11px; font-family: monospace; color: var(--text3); }
    .subagent-error { font-size: 11px; color: var(--red); margin-top: 4px; font-style: italic; }

    .subagent-steps {
      margin-top: 10px; padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .step-row {
      display: flex; align-items: baseline; gap: 7px;
      font-size: 11px; line-height: 1.45; padding: 2px 0;
      font-family: monospace;
    }
    .step-n  { color: var(--text3); flex-shrink: 0; min-width: 24px; }
    .step-tool { color: var(--teal); font-weight: 600; flex-shrink: 0; }
    .step-args { color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; }
    .step-ok   { color: var(--green); flex-shrink: 0; }
    .step-err  { color: var(--red);   flex-shrink: 0; }
    .step-think { color: var(--text3); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px; }

    .empty-state { font-size: 13px; color: var(--text3); }

    /* ── Integration ── */
    .integ-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .integ-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
    .integ-value { font-size: 13px; color: var(--text2); }

    /* ── Event Log ── */
    .log-toolbar {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .log-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
    .log-count { font-size: 11px; color: var(--text3); }

    #event-log { padding: 6px 0; }

    .log-entry {
      display: flex; align-items: flex-start; gap: 0;
      padding: 6px 16px; border-left: 2px solid transparent;
      cursor: pointer; user-select: none; transition: background 0.1s;
    }
    .log-entry:hover   { background: rgba(255,255,255,0.025); }
    .log-entry.expanded { background: rgba(255,255,255,0.04) !important; }
    .log-entry.is-saved { border-left-color: var(--green); background: rgba(61,214,140,0.04); }
    .log-entry.is-error { border-left-color: var(--red); }

    .log-ts {
      font-size: 10px; font-family: monospace; color: var(--text3);
      flex-shrink: 0; width: 60px; padding-top: 2px;
    }
    .log-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      margin-right: 10px; margin-top: 4px; background: var(--text3);
    }
    .log-body { flex: 1; min-width: 0; }
    .log-name {
      font-size: 12px; font-weight: 500; color: var(--text2);
      display: flex; align-items: center; gap: 6px;
    }
    .log-chevron { font-size: 9px; color: var(--text3); transition: transform 0.15s; }
    .log-entry.expanded .log-chevron { transform: rotate(90deg); }
    .log-detail {
      font-size: 11px; color: var(--text3); font-family: monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
    }
    .log-full {
      display: none; margin-top: 7px; padding: 10px 12px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      font-size: 11px; font-family: monospace; color: var(--text2);
      white-space: pre-wrap; word-break: break-all; line-height: 1.5;
      user-select: text;
    }
    .log-entry.expanded .log-full { display: block; }

    .dot-blue   { background: var(--blue); }
    .dot-green  { background: var(--green); }
    .dot-yellow { background: var(--yellow); }
    .dot-red    { background: var(--red); }
    .dot-purple { background: var(--purple); }
    .dot-teal   { background: var(--teal); }

    /* ── Permission modal ── */
    .perm-backdrop {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .perm-backdrop.visible { display: flex; }
    .perm-box {
      background: var(--s1); border: 1px solid var(--yellow);
      border-radius: 14px; padding: 28px 28px 24px; max-width: 580px; width: 90%;
      box-shadow: 0 0 40px rgba(240,180,41,0.15);
    }
    .perm-icon { font-size: 22px; margin-bottom: 10px; }
    .perm-title { font-size: 16px; font-weight: 700; color: var(--yellow); margin-bottom: 6px; }
    .perm-reason { font-size: 12px; color: var(--text2); margin-bottom: 14px; }
    .perm-command {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; font-size: 12px; font-family: monospace;
      color: var(--text); word-break: break-all; margin-bottom: 6px;
      max-height: 160px; overflow-y: auto;
    }
    .perm-agent { font-size: 11px; color: var(--text3); margin-bottom: 18px; }
    .perm-timer { font-size: 11px; color: var(--text3); margin-bottom: 16px; }
    .perm-timer span { color: var(--yellow); font-weight: 600; }
    .perm-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-approve {
      background: var(--green-a); color: var(--green);
      border: 1px solid rgba(61,214,140,0.3); padding: 8px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .btn-approve:hover { background: rgba(61,214,140,0.2); border-color: var(--green); }
    .btn-deny {
      background: var(--red-a); color: var(--red);
      border: 1px solid rgba(242,95,92,0.3); padding: 8px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .btn-deny:hover { background: rgba(242,95,92,0.2); border-color: var(--red); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">A</div>
    <span class="logo-name">Auto-Researcher</span>
  </div>
  <span id="status-pill" class="status-pill stopped">
    <span class="status-dot"></span>
    <span id="status-text">Stopped</span>
  </span>
  <span id="connection-status" class="disconnected">disconnected</span>
  <div class="controls">
    <button class="btn-start"  onclick="apiCall('/start')">&#9654; Start</button>
    <button class="btn-pause"  onclick="apiCall('/pause')">&#9646;&#9646; Pause</button>
    <button class="btn-resume" onclick="apiCall('/resume')">&#8635; Resume</button>
    <button class="btn-stop"   onclick="apiCall('/stop')">&#9632; Stop</button>
  </div>
</header>

<div class="page">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">Iteration</div>
      <div class="stat-value" id="stat-iter">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Baseline</div>
      <div class="stat-value stat-mono" id="stat-baseline">0.0000</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Last Score</div>
      <div class="stat-value stat-mono" id="stat-last-score">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Commit</div>
      <div class="stat-value stat-mono" style="font-size:13px" id="stat-commit">—</div>
    </div>
  </div>

  <!-- Hypothesis -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">Current Hypothesis</span>
      <span class="card-meta" id="hyp-iter"></span>
    </div>
    <div class="card-body">
      <div id="hypothesis-text">Waiting for first iteration…</div>
      <div id="hypothesis-rationale"></div>
    </div>
  </div>

  <!-- Chart -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">Score History</span>
      <span class="card-meta" id="chart-label"></span>
    </div>
    <div class="card-body" style="padding:12px 16px 14px">
      <canvas id="score-chart"></canvas>
    </div>
  </div>

  <!-- Subagents -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">Subagents</span>
      <span class="card-meta" id="subagent-count">current iteration</span>
    </div>
    <div class="card-body">
      <div class="subagent-grid" id="subagent-grid">
        <div class="empty-state">No active subagents</div>
      </div>
    </div>
  </div>

  <!-- Integration -->
  <div class="card">
    <div class="card-head"><span class="card-title">Integration</span></div>
    <div class="card-body">
      <div class="integ-row">
        <div>
          <div class="integ-label">Summary</div>
          <div class="integ-value" id="integration-summary">—</div>
        </div>
        <div>
          <div class="integ-label">Files Touched</div>
          <div class="integ-value" id="integration-files">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Event Log -->
  <div class="card">
    <div class="log-toolbar">
      <span class="log-title">Event Log</span>
      <span class="log-count" id="log-count">0 events</span>
    </div>
    <div id="event-log"></div>
  </div>

</div><!-- .page -->

<!-- ── Permission modal ─────────────────────────────────────────────────── -->
<div class="perm-backdrop" id="perm-backdrop">
  <div class="perm-box">
    <div class="perm-icon">⚠️</div>
    <div class="perm-title">Permission Required</div>
    <div class="perm-reason" id="perm-reason"></div>
    <div class="perm-command" id="perm-command"></div>
    <div class="perm-agent" id="perm-agent"></div>
    <div class="perm-timer">Auto-denying in <span id="perm-countdown">120</span>s</div>
    <div class="perm-actions">
      <button class="btn-deny"    onclick="respondPermission(false)">Deny</button>
      <button class="btn-approve" onclick="respondPermission(true)">Approve</button>
    </div>
  </div>
</div>

<script>
  const scores   = {};   // iter -> score, keyed to avoid dupes
  const subagents = {};  // id -> panel state
  let ws = null, wsRetry = 1000, logCount = 0;

  // ── Permission modal ──────────────────────────────────────────────────────
  let _permQueue = [];   // list of pending {data} objects
  let _permTimer = null;
  let _permCurrent = null;

  function showNextPermission() {
    if (_permCurrent || !_permQueue.length) return;
    _permCurrent = _permQueue.shift();
    const d = _permCurrent;
    document.getElementById('perm-reason').textContent  = `Reason: ${d.reason || 'unknown'}`;
    document.getElementById('perm-command').textContent = d.command || '';
    document.getElementById('perm-agent').textContent   = `Agent: ${(d.requester_id || '').slice(0,8)}`;
    document.getElementById('perm-backdrop').classList.add('visible');

    let remaining = Math.round(d.timeout || 120);
    document.getElementById('perm-countdown').textContent = remaining;
    _permTimer = setInterval(() => {
      remaining--;
      const el = document.getElementById('perm-countdown');
      if (el) el.textContent = remaining;
      if (remaining <= 0) { respondPermission(false); }
    }, 1000);
  }

  async function respondPermission(approve) {
    if (!_permCurrent) return;
    clearInterval(_permTimer); _permTimer = null;
    const d = _permCurrent; _permCurrent = null;
    document.getElementById('perm-backdrop').classList.remove('visible');
    const endpoint = approve ? `/permission/${d.request_id}/approve` : `/permission/${d.request_id}/deny`;
    try { await fetch(endpoint, { method: 'POST' }); } catch(e) { console.error(e); }
    setTimeout(showNextPermission, 200);
  }
  window.respondPermission = respondPermission;

  // ── WebSocket ──────────────────────────────────────────────
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/events`);
    ws.onopen  = () => { setConn(true);  wsRetry = 1000; refreshState(); };
    ws.onclose = () => { setConn(false); setTimeout(connectWS, wsRetry); wsRetry = Math.min(wsRetry * 1.5, 15000); };
    ws.onerror = () => ws.close();
    ws.onmessage = (e) => {
      let evt; try { evt = JSON.parse(e.data); } catch { return; }
      if (evt.type === 'ping') return;
      handleEvent(evt);
      logEvent(evt);
    };
  }

  function setConn(ok) {
    const el = document.getElementById('connection-status');
    el.textContent = ok ? 'connected' : 'disconnected';
    el.className   = ok ? 'connected' : 'disconnected';
  }

  // ── Event handler ──────────────────────────────────────────
  function handleEvent(evt) {
    const d    = evt.data || {};
    const iter = evt.iteration;

    switch (evt.type) {
      case 'loop_started':
        updateStats({ iteration: d.iteration ?? 0, baseline: d.baseline ?? 0 });
        setStatus('running');
        break;

      case 'hypothesis_formed':
        document.getElementById('hypothesis-text').textContent = d.hypothesis || '—';
        const rat = document.getElementById('hypothesis-rationale');
        if (d.rationale) { rat.textContent = d.rationale; rat.classList.add('visible'); }
        else              { rat.textContent = ''; rat.classList.remove('visible'); }
        if (iter != null) document.getElementById('hyp-iter').textContent = `iter ${iter}`;
        Object.keys(subagents).forEach(k => delete subagents[k]);
        renderSubagents();
        document.getElementById('integration-summary').textContent = '—';
        document.getElementById('integration-files').textContent   = '—';
        break;

      case 'dup_rejected':
        document.getElementById('hypothesis-text').textContent =
          'Duplicate detected — reforming with novelty boost…';
        break;

      case 'subagent_spawned':
        subagents[d.subtask_id] = {
          id: d.subtask_id, goal: d.goal || '',
          model: d.model || '', matched_skills: d.matched_skills || [],
          fallback: d.fallback || false, status: 'spawned',
          files: [], error: '', steps: [],
        };
        renderSubagents();
        break;

      case 'subagent_progress':
        if (subagents[d.subtask_id]) {
          subagents[d.subtask_id].status = 'progress';
          subagents[d.subtask_id].step   = d.step;
          renderSubagents();
        }
        break;

      case 'subagent_step': {
        const sa = subagents[d.subtask_id];
        if (sa) {
          sa.steps.push(d);
          if (sa.steps.length > 60) sa.steps.shift();
          renderSubagentSteps(d.subtask_id);
        }
        break;
      }

      case 'subagent_done':
        if (subagents[d.subtask_id]) {
          subagents[d.subtask_id].status = d.status || 'done';
          subagents[d.subtask_id].files  = d.files_touched || [];
          subagents[d.subtask_id].error  = d.reason || d.error || '';
          renderSubagents();
        }
        break;

      case 'review_integrate':
        document.getElementById('integration-summary').textContent =
          `${d.diff_len || 0} chars`;
        break;

      case 'test_scored': {
        const el = document.getElementById('stat-last-score');
        el.textContent = d.score != null ? d.score.toFixed(4) : '—';
        el.className   = 'stat-value stat-mono ' +
          (d.score > (d.baseline || 0) ? 'outcome-win' : 'outcome-mistake');
        if (iter != null && d.score != null) scores[iter] = d.score;
        drawChart();
        break;
      }

      case 'saved':
        document.getElementById('stat-baseline').textContent =
          d.score != null ? d.score.toFixed(4) : '—';
        break;

      case 'memory_recorded':
        if (iter != null) document.getElementById('stat-iter').textContent = iter + 1;
        break;

      case 'shutdown': setStatus('stopped'); break;
      case 'paused':   setStatus('paused');  break;
      case 'resumed':  setStatus('running'); break;

      case 'permission_request':
        _permQueue.push(d);
        showNextPermission();
        break;
      case 'permission_granted':
      case 'permission_denied':
        break;
    }
  }

  // ── Subagents ──────────────────────────────────────────────
  function _stepLogHtml(steps) {
    if (!steps || !steps.length) return '';
    return `<div class="subagent-steps">${steps.map(s => {
      if (s.kind === 'tool_call') {
        const argStr = Object.entries(s.args || {})
          .map(([k, v]) => `${k}=${JSON.stringify(v).slice(0, 60)}`)
          .join(', ');
        return `<div class="step-row">
          <span class="step-n">${s.step}</span>
          <span class="step-tool">${esc(s.tool)}</span>
          <span class="step-args">(${esc(argStr)})</span>
        </div>`;
      }
      if (s.kind === 'tool_result') {
        const badge = s.success
          ? `<span class="step-ok">✓</span>`
          : `<span class="step-err">✗</span>`;
        return `<div class="step-row">
          <span class="step-n"></span>
          ${badge}
          <span class="step-args">${esc((s.result || '').slice(0, 120))}</span>
        </div>`;
      }
      if (s.kind === 'thinking') {
        return `<div class="step-row">
          <span class="step-n">${s.step}</span>
          <span class="step-think">${esc(s.content || '')}</span>
        </div>`;
      }
      return '';
    }).join('')}</div>`;
  }

  function renderSubagents() {
    const grid    = document.getElementById('subagent-grid');
    const entries = Object.values(subagents);
    document.getElementById('subagent-count').textContent =
      entries.length ? `${entries.length} agent${entries.length !== 1 ? 's' : ''}` : 'current iteration';

    if (!entries.length) {
      grid.innerHTML = '<div class="empty-state">No active subagents</div>';
      return;
    }

    grid.innerHTML = entries.map(s => {
      const statusLabel = ({
        spawned: 'Spawned',
        progress: `Step ${s.step ?? '…'}`,
        success: 'Success',
        failed: 'Failed',
        partial: 'Partial',
      })[s.status] || s.status;

      const modelTag = s.fallback
        ? `<span class="tag fallback-tag">${esc(s.model)} · fallback</span>`
        : `<span class="tag model-tag">${esc(s.model)}</span>`;
      const skills = (s.matched_skills || [])
        .map(sk => `<span class="tag skill-tag">${esc(sk)}</span>`).join('');
      const filesHtml = s.files.length
        ? `<span class="subagent-files">${s.files.map(esc).join(' · ')}</span>` : '';
      const errorHtml = s.error
        ? `<div class="subagent-error">${esc(s.error.slice(0, 200))}</div>` : '';

      return `<div class="subagent-panel ${s.status}" id="sa-${s.id}">
        <div class="subagent-header">
          <span class="subagent-id">${esc(s.id.slice(0,8))}</span>
          ${modelTag}${skills}
        </div>
        <div class="subagent-goal">${esc(s.goal)}</div>
        <div class="subagent-row">
          <span class="subagent-status ${s.status}">${statusLabel}</span>
          ${filesHtml}
        </div>
        ${errorHtml}
        <div class="sa-step-log" id="sal-${s.id}">${_stepLogHtml(s.steps)}</div>
      </div>`;
    }).join('');
  }

  function renderSubagentSteps(subtaskId) {
    const sa = subagents[subtaskId];
    if (!sa) return;
    // Update only the step log div — avoid full re-render flicker
    const el = document.getElementById(`sal-${subtaskId}`);
    if (el) {
      el.innerHTML = _stepLogHtml(sa.steps);
    } else {
      renderSubagents();  // panel not yet in DOM (race at spawn time)
    }
  }

  // ── Chart ──────────────────────────────────────────────────
  function drawChart() {
    const canvas = document.getElementById('score-chart');
    const ctx    = canvas.getContext('2d');
    canvas.width  = canvas.offsetWidth;
    canvas.height = 120;
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    const pts = Object.entries(scores)
      .map(([i, s]) => ({ i: +i, s }))
      .sort((a, b) => a.i - b.i);

    if (pts.length < 2) {
      ctx.fillStyle = '#2a2a42';
      ctx.font = '12px Inter, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('Waiting for data…', W / 2, H / 2);
      return;
    }

    const vals = pts.map(p => p.s);
    const minV = Math.min(...vals), maxV = Math.max(...vals, minV + 0.001);
    const pad  = { t: 10, b: 10, l: 6, r: 6 };
    const iW   = W - pad.l - pad.r, iH = H - pad.t - pad.b;
    const px = i => pad.l + (i / (pts.length - 1)) * iW;
    const py = v => pad.t + (1 - (v - minV) / (maxV - minV)) * iH;

    ctx.setLineDash([2, 5]); ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const yy = pad.t + (i / 4) * iH;
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.beginPath(); ctx.moveTo(pad.l, yy); ctx.lineTo(pad.l + iW, yy); ctx.stroke();
    }
    ctx.setLineDash([]);

    const grad = ctx.createLinearGradient(0, pad.t, 0, H);
    grad.addColorStop(0, 'rgba(61,214,140,0.2)');
    grad.addColorStop(1, 'rgba(61,214,140,0)');
    ctx.beginPath();
    ctx.moveTo(px(0), py(vals[0]));
    for (let i = 1; i < pts.length; i++) ctx.lineTo(px(i), py(vals[i]));
    ctx.lineTo(px(pts.length - 1), H - pad.b);
    ctx.lineTo(px(0), H - pad.b);
    ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

    ctx.shadowColor = 'rgba(61,214,140,0.5)'; ctx.shadowBlur = 7;
    ctx.beginPath();
    ctx.moveTo(px(0), py(vals[0]));
    for (let i = 1; i < pts.length; i++) ctx.lineTo(px(i), py(vals[i]));
    ctx.strokeStyle = '#3dd68c'; ctx.lineWidth = 2; ctx.stroke();
    ctx.shadowBlur = 0;

    const lx = px(pts.length - 1), ly = py(vals[vals.length - 1]);
    ctx.shadowColor = 'rgba(61,214,140,0.7)'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#3dd68c'; ctx.fill(); ctx.shadowBlur = 0;

    document.getElementById('chart-label').textContent =
      `latest: ${vals[vals.length - 1].toFixed(4)}`;
  }

  // ── Event log ──────────────────────────────────────────────
  const DOT = {
    hypothesis_formed:'dot-blue', dup_rejected:'dot-yellow',
    decomposed:'dot-purple',      model_routed:'dot-teal',
    subagent_spawned:'dot-blue',  subagent_progress:'dot-yellow',
    subagent_step:'dot-teal',     subagent_done:'dot-green',
    test_scored:'dot-yellow',
    saved:'dot-green',            error:'dot-red',
    reward_hack_rejected:'dot-red', loop_started:'dot-blue',
    paused:'dot-yellow',          resumed:'dot-green', shutdown:'dot-red',
    permission_request:'dot-yellow', permission_granted:'dot-green', permission_denied:'dot-red',
  };

  function logEvent(evt) {
    const log     = document.getElementById('event-log');
    const entry   = document.createElement('div');
    const isSaved = evt.type === 'saved';
    const isError = evt.type === 'error';
    entry.className = 'log-entry' + (isSaved?' is-saved':'') + (isError?' is-error':'');

    const ts   = evt.ts ? evt.ts.slice(11, 19) : '—';
    const d    = evt.data || {};
    const name = evt.type.replace(/_/g, ' ');

    const detail = (() => {
      if (evt.type === 'hypothesis_formed') return d.hypothesis || '';
      if (evt.type === 'test_scored')       return `score ${d.score?.toFixed(4)}  baseline ${d.baseline?.toFixed(4)}`;
      if (evt.type === 'subagent_spawned')  return d.goal || '';
      if (evt.type === 'subagent_step') {
        const id = (d.subtask_id || '').slice(0, 8);
        if (d.kind === 'tool_call')   return `${id} → ${d.tool}(${JSON.stringify(d.args||{}).slice(0,60)})`;
        if (d.kind === 'tool_result') return `${id} ← ${d.tool} ${d.success ? '✓' : '✗'} ${(d.result||'').slice(0,60)}`;
        if (d.kind === 'thinking')    return `${id} thinks: ${(d.content||'').slice(0,80)}`;
        return id;
      }
      if (evt.type === 'subagent_done')     return d.reason || d.error || (d.files_touched||[]).join(', ') || '';
      if (evt.type === 'saved')             return `saved at ${d.score?.toFixed(4)}`;
      if (evt.type === 'error')             return d.error || d.message || '';
      if (evt.type === 'permission_request') return `[${d.reason}] ${(d.command||'').slice(0,80)}`;
      if (evt.type === 'permission_granted') return `approved: ${(d.command||'').slice(0,60)}`;
      if (evt.type === 'permission_denied')  return `denied: ${(d.command||'').slice(0,60)}`;
      return JSON.stringify(d).slice(0, 80);
    })();

    entry.innerHTML = `
      <span class="log-ts">${esc(ts)}</span>
      <span class="log-dot ${DOT[evt.type]||''}"></span>
      <span class="log-body">
        <div class="log-name">${esc(name)}<span class="log-chevron">&#9654;</span></div>
        ${detail ? `<div class="log-detail">${esc(detail)}</div>` : ''}
        <div class="log-full">${esc(JSON.stringify(evt, null, 2))}</div>
      </span>`;
    entry.addEventListener('click', () => entry.classList.toggle('expanded'));

    log.prepend(entry);
    logCount++;
    document.getElementById('log-count').textContent = `${logCount} event${logCount!==1?'s':''}`;
    while (log.children.length > 500) log.removeChild(log.lastChild);
  }

  // ── Status / Stats ─────────────────────────────────────────
  function setStatus(s) {
    document.getElementById('status-pill').className = `status-pill ${s}`;
    document.getElementById('status-text').textContent = s.charAt(0).toUpperCase() + s.slice(1);
  }

  function updateStats({ iteration, baseline, commit }) {
    if (iteration != null) document.getElementById('stat-iter').textContent = iteration;
    if (baseline  != null) document.getElementById('stat-baseline').textContent = baseline.toFixed(4);
    if (commit    != null) document.getElementById('stat-commit').textContent = commit ? commit.slice(0,7) : '—';
  }

  async function apiCall(path) {
    try { await fetch(path, { method: 'POST' }); } catch(e) { console.error(path, e); }
  }

  async function refreshState() {
    try {
      const j = await fetch('/state').then(r => r.json());
      updateStats({ iteration: j.iteration, baseline: j.baseline_score, commit: j.working_commit });
      if (j.current_hypothesis)
        document.getElementById('hypothesis-text').textContent = j.current_hypothesis;
      setStatus(j.running ? (j.paused ? 'paused' : 'running') : 'stopped');
    } catch {}
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  window.addEventListener('resize', drawChart);
  connectWS();
  refreshState();
</script>
</body>
</html>
