ollama_host: "http://localhost:11434"

models:
  coordinator: "qwen2.5:14b-instruct"   # planning + hypothesis — fits in ~9GB at Q4
  default:     "qwen2.5-coder:7b"        # fallback worker — ~4GB
  embed:       "nomic-embed-text"         # 274MB, unchanged

  workers:
    - name: "qwen2.5-coder:7b"
      skills: ["code", "debug", "refactor", "implementation", "optimization", "test"]
      options:
        temperature: 0.1

    - name: "qwen2.5:14b-instruct"
      skills: ["reasoning", "planning", "analysis", "math", "proof", "decomposition", "synthesis"]
      options:
        temperature: 0.3

# === Goal / System Prompt ===
# Point to a plain-text file that describes what you want the AI to improve.
# The file can be as long as you need — it is read at runtime, not inlined here.
# Relative paths are resolved from the directory where you run main.py.
system_prompt_file: "system_prompt.txt"

# === Target ===
target_repo: "/home/arc2/vscode/moe-implementation"          # REQUIRED: absolute path to the repo under improvement
worktree_root: "/tmp/auto-researcher/worktrees"
github_remote: "origin"
github_branch_prefix: "auto-researcher"

# === Loop control ===
max_subagents: 2
dup_threshold: 0.97      # cosine similarity above which a hypothesis is rejected as a near-exact failure duplicate
novelty_boost: 0.3       # temperature bump added when coordinator is forming a novelty-forced hypothesis

# === Context budgets ===
context_token_budget: 8192

coordinator_context_ratios:
  task_spec: 0.20
  memory:    0.30
  files:     0.35
  rolling_summary: 0.15

subagent_context_ratios:
  task_brief:      0.20
  files:           0.50
  memory:          0.15
  rolling_summary: 0.15

# === Subagent execution ===
subagent_step_cap: 20      # max ReAct steps per subagent
summary_every_n:   5       # regenerate rolling summary every N steps

# === Fix loop ===
max_fix_attempts: 10   # max times coordinator retries a failing hypothesis via a fix subagent

# === Sandbox ===
sandbox:
  max_cpu_seconds: 120
  max_memory_mb:   0     # 0 = no virtual-memory cap (training processes need several GB)
  timeout_seconds: 660   # must exceed test.py TIMEOUT_SECONDS (600 s) by a safe margin

# === Persistence ===
data_dir: "./data"   # episodic.db, state.db, semantic_db/ will be created here

# === Server ===
server:
  host: "0.0.0.0"
  port: 8000

# === Notifications ===
# Discord webhook for permission requests and agent alerts.
#
# Setup (2 minutes):
#   1. Open Discord → go to the channel you want notifications in
#   2. Click the gear icon (Edit Channel) → Integrations → Webhooks → New Webhook
#   3. Give it a name like "Auto-Researcher", click "Copy Webhook URL"
#   4. Paste the URL below (replace the placeholder)
#
# Leave discord_webhook_url empty to disable Discord notifications.
#
notifications:
  discord_webhook_url: "https://discord.com/api/webhooks/1529220627259719710/_JNi8dHG0S7YvAFQCOET0gc6BaTv8zIAHrCQpjfSc6CdRW8FgATlYAkpsj8y5oIaGQQP"     # paste your webhook URL here
  dashboard_url: "http://localhost:8000"   # shown in notifications so you know where to go

# === Reward-hacking safeguards ===
protected_patterns:
  - "tests/"
  - "test/"
  - "held_out/"
  - "eval/"
  - "benchmark/"
  - "*.test.*"
  - "test_*.py"
  - "*_test.py"
